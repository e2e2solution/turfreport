services:
  - type: web
    name: vsh-sports-hub
    runtime: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client && npm run build:trainer --prefix client
    startCommand: NODE_ENV=production npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: vsh_owner
      - key: OWNER_PIN
        sync: false
      - key: OWNER_SYNC_KEY
        generateValue: true
      - key: TRAINER_PASSWORD
        value: "123"
